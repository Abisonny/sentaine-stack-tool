<!DOCTYPE html>
<html>
<head>
  <title>Sentaine Stack Decision Tool</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<h2>Stack Decision Tool</h2>

<p>Score each factor (1–5):</p>

<label>Speed:</label> <input id="speed" type="number" min="1" max="5"><br><br>
<label>Data Complexity:</label> <input id="data" type="number" min="1" max="5"><br><br>
<label>Real-time Needs:</label> <input id="realtime" type="number" min="1" max="5"><br><br>
<label>Scalability:</label> <input id="scale" type="number" min="1" max="5"><br><br>
<label>Compliance:</label> <input id="compliance" type="number" min="1" max="5"><br><br>
<label>Backend Logic:</label> <input id="logic" type="number" min="1" max="5"><br><br>

<button onclick="calculate()">Get Recommendation</button>

<div class="result" id="result"></div>

<script src="js/app.js"></script>

</body>
</html>
