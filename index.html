<!DOCTYPE html>
<html>
<head>
  <title>Sentaine Stack Decision Tool</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 40px auto; }
    input { width: 60px; }
    .result { margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>

<h2>Stack Decision Tool</h2>

<p>Score each factor (1–5):</p>

<label>Speed:</label> <input id="speed" type="number" min="1" max="5"><br><br>
<label>Data Complexity:</label> <input id="data" type="number" min="1" max="5"><br><br>
<label>Real-time Needs:</label> <input id="realtime" type="number" min="1" max="5"><br><br>
<label>Scalability:</label> <input id="scale" type="number" min="1" max="5"><br><br>
<label>Compliance:</label> <input id="compliance" type="number" min="1" max="5"><br><br>
<label>Backend Logic:</label> <input id="logic" type="number" min="1" max="5"><br><br>

<button onclick="calculate()">Get Recommendation</button>

<div class="result" id="result"></div>

<script>
function calculate() {
  let s = +document.getElementById("speed").value;
  let d = +document.getElementById("data").value;
  let r = +document.getElementById("realtime").value;
  let sc = +document.getElementById("scale").value;
  let c = +document.getElementById("compliance").value;
  let l = +document.getElementById("logic").value;

  let supabase =
    s*0.25 + d*0.20 + r*0.15 + sc*0.15 + c*0.15 + l*0.10;

  let firebase =
    s*0.25 + d*0.08 + r*0.20 + sc*0.15 + c*0.07 + l*0.10;

  let node =
    s*0.05 + d*0.25 + r*0.15 + sc*0.20 + c*0.20 + l*0.15;

  let recommendation = "";

  if (supabase > firebase && supabase > node) {
    recommendation = "Use Supabase (Recommended Default)";
  } else if (firebase > node) {
    recommendation = "Use Firebase (Mobile / Realtime Focus)";
  } else {
    recommendation = "Use Custom Node Backend (Advanced Use)";
  }

  document.getElementById("result").innerHTML =
    "Supabase: " + supabase.toFixed(2) + "<br>" +
    "Firebase: " + firebase.toFixed(2) + "<br>" +
    "Node: " + node.toFixed(2) + "<br><br>" +
    "👉 Recommendation: " + recommendation;
}
</script>

</body>
</html>
